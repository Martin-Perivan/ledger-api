services:
  mongo:
    image: mongo:7
    command: ["mongod", "--bind_ip_all", "--replSet", "rs0", "--auth", "--port", "27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${LOCAL_MONGODB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${LOCAL_MONGODB_ROOT_PASSWORD:-RootAdmin321}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${LOCAL_MONGODB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${LOCAL_MONGODB_ROOT_PASSWORD:-RootAdmin321}
      LOCAL_MONGODB_DATABASE: ${LOCAL_MONGODB_DATABASE:-ledger}
      LOCAL_MONGODB_APP_USERNAME: ${LOCAL_MONGODB_APP_USERNAME:-admin}
      LOCAL_MONGODB_APP_PASSWORD: ${LOCAL_MONGODB_APP_PASSWORD:-Admin321}
    volumes:
      - ./docker/mongo-init.sh:/scripts/mongo-init.sh:ro
    entrypoint: ["bash", "/scripts/mongo-init.sh"]

volumes:
  mongo_data:
